<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

font-family:Vazirmatn;
background:#0b1b3a;
color:white;
}

header{

padding:20px;

font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

.category{
margin-top:20px;

color:#ffd700;
font-weight:bold;
}

.card{

overflow:hidden;
margin-top:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.card img{

height:180px;
object-fit:cover;

.card-content{
padding:10px;
}

.title{

font-weight:bold;
}

.desc{

}

.btn{

display:inline-block;
background:#ffd700;
color:#000;
padding:8px 15px;
border-radius:10px;
font-weight:bold;
text-decoration:none;
}
