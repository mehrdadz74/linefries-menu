<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LINE FRIES MENU</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<!-- QR Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
font-family:'Vazirmatn',sans-serif;
background:#0b1b3a;
color:white;
}

header{
text-align:center;
padding:25px;
font-size:28px;
font-weight:700;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:#132a57;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:16px;
}

.card p{
margin:0 10px 10px;
font-size:12px;
opacity:0.8;
}

.qr-box{
margin:30px auto;
text-align:center;
background:#132a57;
padding:20px;
border-radius:20px;
width:90%;
}

footer{
text-align:center;
font-size:12px;
opacity:0.7;
padding:10px;
}
</style>
</head>

<body>

<header>
🍟 LINE FRIES MENU
</header>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1606755962773-d324e2c5fbc8" />
<h3>Classic Burger</h3>
<p>برگر مخصوص لاین فرایز</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606757389940-2d3c1f1c7b4c" />
<h3>Cheese Fries</h3>
<p>سیب زمینی با پنیر</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349" />
<h3>Chicken Burger</h3>
<p>برگر مرغ ترد</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-040a8fde462f" />
<h3>Drink</h3>
<p>نوشیدنی خنک</p>
</div>

</div>

<div class="qr-box">
<h3>📱 اسکن برای مشاهده منو</h3>
<div id="qrcode"></div>
<p id="link"></p>
</div>

<footer>
LINE FRIES © 2026
</footer>

<script>
// لینک سایت (GitHub Pages)
const url = window.location.href;

document.getElementById("link").innerText = url;

// ساخت QR
new QRCode(document.getElementById("qrcode"), {
text: url,
width: 160,
height: 160
});
</script>

</body>
</html>
