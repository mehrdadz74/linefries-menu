<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LINE FRIES MENU</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap');

body{
    margin:0;
    font-family: Vazirmatn, sans-serif;
    background:#0b0f1a;
    color:#fff;
}

/* Header */
.header{
    text-align:center;
    padding:25px 15px;
    background:linear-gradient(135deg,#0d47a1,#000);
    border-bottom:3px solid #ffcc00;
}

.logo{
    font-size:34px;
    font-weight:700;
    color:#ffcc00;
    letter-spacing:2px;
}

.subtitle{
    font-size:14px;
    color:#ccc;
}

/* Menu container */
.container{
    padding:15px;
}

/* Food card */
.card{
    display:flex;
    background:#121a2a;
    margin-bottom:15px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    transform:translateY(20px);
    opacity:0;
    animation:fadeUp 0.6s forwards;
}

.card:nth-child(2){animation-delay:0.1s}
.card:nth-child(3){animation-delay:0.2s}
.card:nth-child(4){animation-delay:0.3s}
.card:nth-child(5){animation-delay:0.4s}
.card:nth-child(6){animation-delay:0.5s}

@keyframes fadeUp{
    to{
        transform:translateY(0);
        opacity:1;
    }
}

.card img{
    width:110px;
    height:110px;
    object-fit:cover;
}

.info{
    padding:10px 12px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.name{
    font-size:18px;
    font-weight:600;
    color:#fff;
}

.desc{
    font-size:12px;
    color:#aaa;
    margin-top:5px;
}

/* Footer */
.footer{
    text-align:center;
    padding:20px;
    font-size:12px;
    color:#777;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">LINE FRIES</div>
    <div class="subtitle">Fresh • Crispy • Delicious</div>
</div>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1604908177225-1c9b3b0f3b1a" />
        <div class="info">
            <div class="name">Classic Fries</div>
            <div class="desc">سیب‌زمینی کلاسیک ترد</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086" />
        <div class="info">
            <div class="name">Cheese Fries</div>
            <div class="desc">با سس پنیر ویژه</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1601050690597-df0568f70950" />
        <div class="info">
            <div class="name">Chicken Burger</div>
            <div class="desc">برگر مرغ تازه</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" />
        <div class="info">
            <div class="name">Beef Burger</div>
            <div class="desc">برگر گوشت خالص</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1604382354936-07c5d9983bd3" />
        <div class="info">
            <div class="name">Special Combo</div>
            <div class="desc">پکیج ویژه LINE FRIES</div>
        </div>
    </div>

</div>

<div class="footer">
    © LINE FRIES - All Rights Reserved
</div>

</body>
</html>
